# R69 power-button action — switch this one line to change what the remote's power key does.
#
#   HandlePowerKey=poweroff   (default) clean shutdown; the no-PMIC SoC parks, and the remote
#                             powers it back on with a ~10-15 s cold boot. Red LED while off.
#   HandlePowerKey=suspend    suspend-to-RAM: instant resume, red LED in standby, IR wakes it.
#                             (Needs the suspend verb enabled — r69-suspend.conf does that.)
#
# After editing: systemctl restart systemd-logind. Both modes are fully set up; only this line picks
# the default. Staged to /etc/systemd/logind.conf.d/.
[Login]
HandlePowerKey=poweroff
