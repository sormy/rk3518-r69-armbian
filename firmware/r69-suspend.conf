# R69: enable suspend-to-RAM (deep mem). Armbian disables the suspend verb by default (most SBCs
# can't), but the R69 suspends, resumes (RAM intact, WiFi survives), and IR-wakes correctly. This
# only makes the verb *available* — the power key uses it only when HandlePowerKey=suspend
# (see the logind drop-in). Staged to /etc/systemd/sleep.conf.d/.
[Sleep]
AllowSuspend=yes
SuspendState=mem
